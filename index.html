<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">

<title>Examen Extraordinario | Estructura Socioeconómica de México</title>
<style>
:root{
  --azul:#001E7C; --azul2:#0B2AA0; --azulSuave:#EEF3FF; --dorado:#B08A00; --texto:#111827; --gris:#6B7280; --linea:#E5E7EB; --ok:#0E7A3A; --bad:#B42318; --fondo:#F7F9FF;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--fondo);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--texto)}
.app{max-width:520px;margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 0 40px rgba(0,30,124,.12)}
.header{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,#fff 0%,#f6f8ff 65%,#edf2ff 100%);border-bottom:1px solid var(--linea);padding:12px 16px 10px}
.brand{display:flex;gap:12px;align-items:center}
.brand img{width:118px;height:auto}
.brand h1{font-size:15px;line-height:1.1;margin:0;color:var(--azul);font-weight:900}
.brand p{margin:3px 0 0;font-size:12px;color:var(--gris)}
.progressWrap{margin-top:12px}
.progressInfo{display:flex;justify-content:space-between;font-size:12px;color:var(--gris);margin-bottom:6px}
.bar{height:9px;background:#e8ecff;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,var(--azul),#3357E8);border-radius:999px;transition:.25s}
.tabs{display:flex;gap:7px;overflow-x:auto;padding:12px 16px;background:#fff;border-bottom:1px solid var(--linea)}
.tab{border:1px solid #dbe2ff;color:var(--azul);background:#fff;border-radius:999px;padding:8px 11px;font-weight:800;white-space:nowrap}
.tab.active{background:var(--azul);color:#fff}
main{padding:16px 14px 90px}
.panel{display:none}
.panel.active{display:block}
.sectionTitle{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin:4px 0 12px}
.sectionTitle h2{font-size:19px;line-height:1.15;margin:0;color:var(--azul)}
.badge{background:#FFF7D6;color:#6d5200;border:1px solid #F2D46B;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
.card{border:1px solid var(--linea);border-radius:18px;padding:14px;margin:12px 0;background:#fff;box-shadow:0 8px 22px rgba(17,24,39,.06)}
.qhead{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.num{width:28px;height:28px;border-radius:50%;background:var(--azulSuave);color:var(--azul);display:grid;place-items:center;font-weight:900;font-size:13px;flex:0 0 auto}
.qtext{font-size:15px;line-height:1.38;font-weight:650}
.input{width:100%;border:1px solid #cfd7f5;border-radius:14px;padding:12px 13px;font-size:16px;margin-top:10px;outline:none}
.input:focus{border-color:var(--azul);box-shadow:0 0 0 4px rgba(0,30,124,.08)}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{border:0;border-radius:13px;padding:10px 12px;font-weight:900;background:var(--azul);color:#fff;cursor:pointer}
.btn.secondary{background:#eef2ff;color:var(--azul)}
.btn.ghost{background:#fff;border:1px solid #dbe2ff;color:var(--azul)}
.feedback{display:none;margin-top:10px;padding:10px;border-radius:14px;font-size:14px;line-height:1.35}
.feedback.ok{display:block;background:#ECFDF3;color:var(--ok);border:1px solid #ABEFC6}
.feedback.bad{display:block;background:#FEF3F2;color:var(--bad);border:1px solid #FECDCA}
.answer{display:none;margin-top:9px;padding:10px;background:#F8FAFC;border-left:4px solid var(--azul);border-radius:10px;font-size:14px;line-height:1.35}
.answer.show{display:block}
.model{font-weight:950;color:var(--azul);font-size:16px;margin-bottom:9px;text-transform:uppercase;letter-spacing:.02em}
.option{border:1px solid #dbe2ff;border-radius:14px;padding:11px 12px;margin:8px 0;background:#fbfcff;line-height:1.35;font-size:14px;cursor:pointer}
.option.selected.good{border-color:#12B76A;background:#ECFDF3;color:#05603A}
.option.selected.wrong{border-color:#F04438;background:#FEF3F2;color:#912018}
.note{font-size:12px;color:#6B7280;margin-top:8px}
.cycleBox{background:linear-gradient(180deg,#f8faff,#fff);border:1px dashed #bdc9ff;border-radius:18px;padding:16px;margin-top:12px}
.wave{height:85px;position:relative;margin:8px 0 14px}
.wave svg{width:100%;height:100%}
.labels{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;text-align:center;font-size:11px;color:var(--azul);font-weight:900}
.footerbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:520px;width:100%;background:#fff;border-top:1px solid var(--linea);padding:10px 14px;display:flex;gap:10px;z-index:40}
.footerbar button{flex:1}
.small{font-size:12px;color:var(--gris);line-height:1.35}
.pill{display:inline-block;background:var(--azulSuave);color:var(--azul);border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900;margin-top:4px}
@media print{.header,.tabs,.footerbar,.actions{display:none}.app{box-shadow:none;max-width:none}main{padding:0}.panel{display:block!important;page-break-after:always}}
</style>
</head>

function norm(s){return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9ñ]+/g,' ').trim();}
function acceptable(val, answers){let v=norm(val); return answers.some(a=>{let n=norm(a); return v===n || (v.length>5 && (v.includes(n)||n.includes(v)));});}
function totalItems(){return DATA.sections.reduce((n,s)=>n+s.items.length,0)}
function answeredCount(){return Object.values(state).filter(Boolean).length}
function updateProgress(){let a=answeredCount(), t=totalItems();document.getElementById('scoreText').textContent=`Avance: ${a}/${t}`;document.getElementById('scorePct').textContent=Math.round(a*100/t)+'%';document.getElementById('fill').style.width=(a*100/t)+'%';}
function makeTabs(){const tabs=document.getElementById('tabs');tabs.innerHTML='';DATA.sections.forEach((s,i)=>{let b=document.createElement('button');b.className='tab'+(i===active?' active':'');b.textContent=s.title.split(')')[0]+') '+s.percent;b.onclick=()=>{active=i;render();};tabs.appendChild(b);})}
function render(){makeTabs();const main=document.getElementById('main');main.innerHTML='';DATA.sections.forEach((s,si)=>{const p=document.createElement('section');p.className='panel'+(si===active?' active':'');p.innerHTML=`<div class="sectionTitle"><h2>${s.title}</h2><span class="badge">${s.percent}</span></div>`; if(s.type==='fill') renderFill(p,s,si); if(s.type==='choiceGrid') renderChoice(p,s,si); if(s.type==='cycle') renderCycle(p,s,si); main.appendChild(p);});updateProgress();}
function renderFill(p,s,si){s.items.forEach((it,ii)=>{let id=`${s.id}-${ii}`;let c=document.createElement('div');c.className='card';c.innerHTML=`<div class="qhead"><div class="num">${ii+1}</div><div class="qtext">${it.q}</div></div>${it.hint?`<div class="small">Pista: ${it.hint}</div>`:''}<input class="input" id="inp-${id}" placeholder="Escribe tu respuesta"><div class="actions"><button class="btn" onclick="checkFill('${id}',${si},${ii})">Revisar</button><button class="btn ghost" onclick="showAnswer('${id}')">Ver respuesta</button></div><div class="feedback" id="fb-${id}"></div><div class="answer" id="ans-${id}"><b>Respuesta esperada:</b> ${Array.isArray(it.a)?it.a[0]:it.a}</div>`;p.appendChild(c);})}
function checkFill(id,si,ii){let it=DATA.sections[si].items[ii];let v=document.getElementById('inp-'+id).value;let ok=acceptable(v,Array.isArray(it.a)?it.a:[it.a]);let fb=document.getElementById('fb-'+id);fb.className='feedback '+(ok?'ok':'bad');fb.textContent=ok?'Correcto.':'Revisa tu respuesta o toca “Ver respuesta”.'; if(ok) state[id]=true; updateProgress();}
function showAnswer(id){document.getElementById('ans-'+id).classList.toggle('show'); state[id]=true; updateProgress();}
function renderChoice(p,s,si){s.items.forEach((it,ii)=>{let id=`${s.id}-${ii}`;let c=document.createElement('div');c.className='card';let opts=it.options.map((o,oi)=>`<div class="option" onclick="pickOption('${id}',${si},${ii},${oi},this)">${o}</div>`).join('');c.innerHTML=`<div class="qhead"><div class="num">${ii+1}</div><div><div class="model">${it.model}</div><div class="small">Selecciona el recuadro que corresponde al modelo.</div></div></div>${opts}${it.note?`<div class="note">${it.note}</div>`:''}<div class="answer" id="ans-${id}"><b>Respuesta esperada:</b> ${it.options[it.answer]}</div>`;p.appendChild(c);})}
function pickOption(id,si,ii,oi,el){let it=DATA.sections[si].items[ii];[...el.parentNode.querySelectorAll('.option')].forEach(x=>x.classList.remove('selected','good','wrong'));el.classList.add('selected',oi===it.answer?'good':'wrong');document.getElementById('ans-'+id).classList.add('show'); if(oi===it.answer) state[id]=true; updateProgress();}
function renderCycle(p,s,si){const box=document.createElement('div');box.className='cycleBox';box.innerHTML=`<div class="wave"><svg viewBox="0 0 420 100" preserveAspectRatio="none"><path d="M10 70 C70 80, 90 70, 125 35 S205 15, 245 55 S320 95, 365 55 S405 50, 415 55" fill="none" stroke="#001E7C" stroke-width="4" stroke-linecap="round"/><circle cx="125" cy="35" r="5" fill="#B08A00"/><circle cx="245" cy="55" r="5" fill="#B08A00"/><circle cx="330" cy="78" r="5" fill="#B08A00"/></svg></div><div class="labels"><span>Recuperación</span><span>Expansión</span><span>Recesión</span><span>Depresión</span></div></div>`;p.appendChild(box); renderFill(p,s,si);}
function nextSection(){active=Math.min(active+1,DATA.sections.length-1);render();window.scrollTo(0,0)}
function prevSection(){active=Math.max(active-1,0);render();window.scrollTo(0,0)}
render();
</script>
</body>
</html>
